{% extends "base.html" %}
{% block content %}

<section class="section">
    <div class="blog-detail-wrapper">

        <h1 class="blog-detail-title">
            {{ blog.title }}
        </h1>

        <div class="blog-detail-meta">
            By {{ blog.author }} • {{ blog.created_at|date:"F d, Y" }}
        </div>

        <div class="blog-detail-content">
            {{ blog.content|linebreaks }}
        </div>

    </div>
</section>

{% endblock %}
